<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Red Day 2 — Scott Gray Art</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Spectral:ital,wght@0,300;0,400;1,300;1,400&family=Crimson+Pro:wght@300;400&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --linen:    #f4ede2;
  --linen2:   #ede3d4;
  --linen3:   #e2d5c0;
  --paper:    #faf7f2;
  --terra:    #b5522a;
  --terra2:   #8a3d1f;
  --ochre:    #c8922a;
  --ochre2:   #a07020;
  --umber:    #6b4c35;
  --umber2:   #4a3325;
  --ink:      #2c2017;
  --ink2:     #6b5545;
  --ink3:     #9c8070;
  --border:   #d8cbb8;
  --border2:  #c8baa5;
  --font-display: 'Playfair Display', 'Georgia', serif;
  --font-body:    'Spectral', Georgia, serif;
  --font-caption: 'Crimson Pro', Georgia, serif;
  --max: 1440px;
  --nav-h: 68px;
}

html { font-size: 17px; scroll-behavior: smooth; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--font-body);
  font-weight: 300;
  line-height: 1.7;
  min-height: 100vh;
}

/* Linen texture */
body::after {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 9998;
  background-image:
    repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(180,150,100,0.012) 3px, rgba(180,150,100,0.012) 4px),
    repeating-linear-gradient(0deg,  transparent, transparent 3px, rgba(180,150,100,0.012) 3px, rgba(180,150,100,0.012) 4px);
}

/* ── Nav ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; height: var(--nav-h);
  background: rgba(250,247,242,0.94); backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border); z-index: 100; display: flex; align-items: center;
}
.nav-inner {
  max-width: var(--max); margin: 0 auto; padding: 0 3rem;
  width: 100%; display: flex; align-items: center; justify-content: space-between;
}
.nav-logo {
  font-family: var(--font-display); font-size: 1.15rem; font-weight: 400;
  font-style: italic; color: var(--ink); text-decoration: none; transition: color 0.2s;
}
.nav-logo:hover { color: var(--terra); }
.nav-links { list-style: none; display: flex; gap: 2.5rem; align-items: center; }
.nav-links a {
  font-family: var(--font-caption); font-size: 0.88rem; letter-spacing: 0.06em;
  color: var(--ink2); text-decoration: none; transition: color 0.2s; position: relative;
}
.nav-links a::after {
  content: ''; position: absolute; bottom: -3px; left: 0;
  width: 0; height: 1px; background: var(--terra); transition: width 0.3s ease;
}
.nav-links a:hover, .nav-links a.active { color: var(--ink); }
.nav-links a:hover::after, .nav-links a.active::after { width: 100%; }

/* ── Layout ── */
main { padding-top: var(--nav-h); }
.container { max-width: var(--max); margin: 0 auto; padding: 0 3rem; }

/* ── Hero ── */
.hero {
  padding: 6rem 3rem 5rem; max-width: var(--max); margin: 0 auto;
  display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: end;
  border-bottom: 1px solid var(--border);
}
.hero-label {
  display: block; font-family: var(--font-caption); font-size: 0.8rem;
  letter-spacing: 0.18em; text-transform: uppercase; color: var(--terra); margin-bottom: 1.2rem;
}
.hero h1 {
  font-family: var(--font-display); font-size: clamp(2.8rem, 6vw, 5.5rem);
  font-weight: 400; font-style: italic; line-height: 1.05; color: var(--ink); margin-bottom: 1.5rem;
}
.hero-desc {
  font-size: 1.05rem; color: var(--ink2); line-height: 1.9; font-style: italic;
  border-left: 2px solid var(--ochre2); padding-left: 1.5rem;
}
.hero-meta { margin-top: 2rem; font-family: var(--font-caption); font-size: 0.82rem; color: var(--ink3); }

/* ── Section header ── */
.section-head {
  padding: 4rem 0 2.5rem; display: flex; align-items: baseline;
  justify-content: space-between; border-bottom: 1px solid var(--border); margin-bottom: 3.5rem;
}
.section-head h2 { font-family: var(--font-display); font-size: 1.9rem; font-weight: 400; font-style: italic; }

/* ── Masonry ── */
.masonry { columns: 3; column-gap: 1.5rem; padding-bottom: 5rem; }
@media (max-width: 1100px) { .masonry { columns: 2; } }
@media (max-width: 640px)  { .masonry { columns: 1; } }

.masonry-item {
  break-inside: avoid; margin-bottom: 1.5rem; display: block;
  text-decoration: none; color: inherit; position: relative;
  overflow: hidden; background: var(--linen2);
}
.masonry-item img {
  width: 100%; height: auto; display: block; cursor: zoom-in;
  transition: transform 0.6s cubic-bezier(0.25,0.46,0.45,0.94), filter 0.5s;
  filter: saturate(0.9) sepia(0.05);
}
.masonry-item:hover img { transform: scale(1.025); filter: saturate(1) sepia(0); }

.masonry-item .caption {
  padding: 1rem 1.1rem 1.25rem; background: var(--linen2); border-top: 1px solid var(--border);
  opacity: 0; transform: translateY(4px); transition: opacity 0.35s, transform 0.35s;
}
.masonry-item:hover .caption { opacity: 1; transform: translateY(0); }
.caption h3 {
  font-family: var(--font-display); font-size: 1rem; font-weight: 400;
  font-style: italic; color: var(--ink); margin-bottom: 0.2rem;
}
.caption .cap-media { font-family: var(--font-caption); font-size: 0.78rem; color: var(--ink3); }

/* Text cards (no image) */
.masonry-item.text-card {
  padding: 2rem; border: 1px solid var(--border2); background: var(--linen);
  transition: border-color 0.3s, background 0.3s;
}
.masonry-item.text-card:hover { border-color: var(--ochre2); background: var(--linen2); }
.masonry-item.text-card .caption { padding: 0; background: none; border: none; opacity: 1; transform: none; }
.masonry-item.text-card h3 { font-size: 1.2rem; margin-bottom: 0.6rem; }
.masonry-item.text-card p { font-size: 0.88rem; color: var(--ink2); line-height: 1.65; font-style: italic; }
.text-card-date { margin-top: 1.2rem; font-family: var(--font-caption); font-size: 0.76rem; color: var(--ink3); }

/* ── Folder overview grid ── */
.folder-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 2px;
  margin-bottom: 5rem;
}
@media (max-width: 900px) { .folder-grid { margin-bottom: 3rem; } }

.folder-card {
  position: relative; display: block; text-decoration: none;
  overflow: hidden; background: var(--linen3); aspect-ratio: 4/3;
}
.folder-card img {
  width: 100%; height: 100%; object-fit: cover; display: block;
  transition: transform 0.7s cubic-bezier(0.25,0.46,0.45,0.94), filter 0.5s;
  filter: saturate(0.85) sepia(0.08);
}
.folder-card:hover img { transform: scale(1.04); filter: saturate(1) sepia(0); }
.folder-card-no-img {
  width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-size: 1.5rem; font-style: italic; color: var(--ink3);
}
.folder-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(22,14,8,0.82) 0%, rgba(22,14,8,0.1) 55%, transparent 100%);
  display: flex; flex-direction: column; justify-content: flex-end;
  padding: 2rem 2.2rem; transition: background 0.4s;
}
.folder-card:hover .folder-overlay {
  background: linear-gradient(to top, rgba(22,14,8,0.9) 0%, rgba(22,14,8,0.2) 60%, transparent 100%);
}
.folder-name {
  font-family: var(--font-display); font-size: 1.8rem; font-weight: 400;
  font-style: italic; color: #fff; line-height: 1.1; margin-bottom: 0.4rem;
  text-shadow: 0 2px 12px rgba(0,0,0,0.4);
}
.folder-count {
  font-family: var(--font-caption); font-size: 0.8rem; letter-spacing: 0.12em;
  text-transform: uppercase; color: rgba(255,255,255,0.55);
}
.folder-arrow {
  position: absolute; top: 1.5rem; right: 1.8rem; font-size: 1.2rem;
  color: rgba(255,255,255,0); transition: color 0.3s, transform 0.3s;
}
.folder-card:hover .folder-arrow { color: rgba(255,255,255,0.7); transform: translateX(4px); }

/* ── Filter pills ── */
.filters { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-bottom: 3rem; }
.filter-pill {
  font-family: var(--font-caption); font-size: 0.82rem; letter-spacing: 0.06em;
  padding: 0.35rem 1.1rem; border: 1px solid var(--border2); border-radius: 100px;
  background: transparent; color: var(--ink3); cursor: pointer; transition: all 0.2s;
}
.filter-pill:hover { color: var(--ink); border-color: var(--umber); }
.filter-pill.active { background: var(--terra); border-color: var(--terra); color: #fff; }

/* ── Artwork detail ── */
.artwork-layout {
  display: grid; grid-template-columns: 1fr 360px;
  gap: 5rem; padding: 4rem 0 6rem; align-items: start;
}
@media (max-width: 960px) { .artwork-layout { grid-template-columns: 1fr; gap: 3rem; } }

.artwork-image-wrap { position: sticky; top: calc(var(--nav-h) + 2rem); }
.artwork-image-wrap img {
  width: 100%; height: auto; display: block; cursor: zoom-in;
  box-shadow: 0 8px 40px rgba(44,32,23,0.15), 0 2px 8px rgba(44,32,23,0.08);
}

.artwork-back {
  font-family: var(--font-caption); font-size: 0.82rem; color: var(--ink3);
  text-decoration: none; letter-spacing: 0.06em;
  display: inline-flex; align-items: center; gap: 0.4rem;
  margin-bottom: 2.5rem; transition: color 0.2s;
}
.artwork-back:hover { color: var(--terra); }
.artwork-back::before { content: '←'; }

.artwork-title {
  font-family: var(--font-display); font-size: clamp(1.8rem, 3.5vw, 2.8rem);
  font-weight: 400; font-style: italic; line-height: 1.15; margin-bottom: 2rem;
}

/* Primary details: Date, Size, Price — prominent */
.artwork-details { margin-bottom: 2rem; display: flex; flex-direction: column; gap: 0.6rem; }
.detail-line {
  display: flex; align-items: baseline; gap: 0.75rem;
  font-family: var(--font-caption); font-size: 1rem; color: var(--ink2);
}
.detail-label {
  font-size: 0.7rem; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--ink3); min-width: 3.5rem;
}
.detail-line.price-line .detail-value { color: var(--terra2); font-size: 1.05rem; }

/* Secondary specs: Media, Series */
.artwork-specs {
  border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
  padding: 1.2rem 0; margin-bottom: 2rem;
  display: flex; flex-direction: column; gap: 0.65rem;
}
.spec-row { display: flex; justify-content: space-between; align-items: baseline; gap: 1rem; }
.spec-label { font-family: var(--font-caption); font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink3); }
.spec-value { font-family: var(--font-caption); font-size: 0.92rem; color: var(--ink2); text-align: right; }

/* Optional description */
.artwork-description {
  font-size: 1rem; line-height: 1.85; color: var(--ink2); font-style: italic;
  margin-bottom: 1.5rem; padding-left: 1rem; border-left: 2px solid var(--border2);
}

/* Markdown body */
.artwork-body { font-size: 0.97rem; line-height: 1.85; color: var(--ink2); }
.artwork-body p { margin-bottom: 1.2rem; }
.artwork-body h2, .artwork-body h3 {
  font-family: var(--font-display); font-weight: 400; font-style: italic;
  margin: 2rem 0 0.75rem; color: var(--ink);
}
.artwork-body h2 { font-size: 1.3rem; }
.artwork-body h3 { font-size: 1.1rem; }
.artwork-body blockquote {
  border-left: 2px solid var(--ochre2); padding: 0.3rem 0 0.3rem 1.2rem;
  margin: 1.5rem 0; font-style: italic; color: var(--ink3);
}
.artwork-body a { color: var(--terra); text-underline-offset: 3px; }
.artwork-body strong { font-weight: 500; color: var(--ink); }
.artwork-body img { max-width: 100%; height: auto; margin: 1.5rem 0; }
.dead-link { color: var(--ink3); text-decoration: line-through; }

/* ── About ── */
.about-layout { max-width: 680px; padding: 5rem 0 8rem; }
.about-layout h1 { font-family: var(--font-display); font-size: 2.5rem; font-style: italic; font-weight: 400; margin-bottom: 2.5rem; }
.about-body { font-size: 1.05rem; line-height: 1.9; }
.about-body p { margin-bottom: 1.4rem; }
.about-body h2 { font-family: var(--font-display); font-style: italic; font-size: 1.5rem; font-weight: 400; margin: 2.5rem 0 0.8rem; }
.about-body a { color: var(--terra); }

/* ── Footer ── */
footer {
  border-top: 1px solid var(--border); padding: 2.5rem 3rem;
  display: flex; justify-content: space-between; align-items: center;
  max-width: var(--max); margin: 0 auto;
}
.footer-name { font-family: var(--font-display); font-style: italic; font-size: 0.95rem; color: var(--ink2); }
.footer-note { font-family: var(--font-caption); font-size: 0.76rem; color: var(--ink3); letter-spacing: 0.06em; }

/* ── Lightbox ── */
.lb {
  display: none; position: fixed; inset: 0;
  background: rgba(22,16,10,0.96); z-index: 1000;
  align-items: center; justify-content: center; cursor: zoom-out;
}
.lb.open { display: flex; }
.lb img { max-width: 88vw; max-height: 88vh; object-fit: contain; box-shadow: 0 30px 80px rgba(0,0,0,0.6); }
.lb-close {
  position: absolute; top: 1.5rem; right: 2rem;
  font-family: var(--font-caption); font-size: 0.82rem;
  color: rgba(255,255,255,0.4); cursor: pointer; letter-spacing: 0.1em;
  text-transform: uppercase; transition: color 0.2s;
}
.lb-close:hover { color: rgba(255,255,255,0.9); }

/* ── Animations ── */
@keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.fade-up { animation: fadeUp 0.65s cubic-bezier(0.22,1,0.36,1) both; }

/* ── Responsive ── */
@media (max-width: 900px) {
  .hero { grid-template-columns: 1fr; gap: 2rem; padding: 4rem 1.5rem 3rem; }
  .container { padding: 0 1.5rem; }
  nav .nav-inner { padding: 0 1.5rem; }
  footer { padding: 2rem 1.5rem; flex-direction: column; gap: 0.75rem; text-align: center; }
  .masonry { column-gap: 1rem; }
  .masonry-item { margin-bottom: 1rem; }
}
</style>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a href="/" class="nav-logo">Scott Gray Art</a>
      <ul class="nav-links"><li><a href="/" >Works</a></li><li><a href="/Available Works" >Available Works</a></li><li><a href="/Barbados Era" >Barbados Era</a></li><li><a href="/about" >About</a></li></ul>
    </div>
  </nav>
  <main>
<div class="container">
  <div class="artwork-layout">
    <div class="artwork-image-wrap"><img src="/images/Red%20Day%202.png" alt="Red Day 2" data-zoomable></div>
    <div class="artwork-info">
      <a class="artwork-back" href="/Available Works">Back to Available Works</a>
      <h1 class="artwork-title">Red Day 2</h1>
      <div class="artwork-details">
<div class="detail-line">
  <span class="detail-label">Date</span>
  <span class="detail-value">2025-03-18</span>
</div>
<div class="detail-line">
  <span class="detail-label">Size</span>
  <span class="detail-value">8" Circle</span>
</div>
<div class="detail-line price-line">
  <span class="detail-label">Price</span>
  <span class="detail-value">$CAD 390</span>
</div></div>
      <div class="artwork-specs">
<div class="spec-row">
  <span class="spec-label">Media</span>
  <span class="spec-value">Acrylic on Alu Panel</span>
</div></div>
      
      
    </div>
  </div>
</div></main>
  <footer>
    <span class="footer-name">Scott Gray Art</span>
    <span class="footer-note">Made from an Obsidian vault</span>
  </footer>
  <div class="lb" id="lb"><span class="lb-close">close ×</span><img src="" alt=""></div>
  <script>
// Lightbox
const lb = document.getElementById('lb');
if (lb) {
  document.querySelectorAll('[data-zoomable]').forEach(img => {
    img.addEventListener('click', e => {
      e.preventDefault(); e.stopPropagation();
      lb.querySelector('img').src = img.src;
      lb.classList.add('open');
    });
  });
  lb.addEventListener('click', () => lb.classList.remove('open'));
  document.addEventListener('keydown', e => { if (e.key === 'Escape') lb.classList.remove('open'); });
}

// Filter pills
document.querySelectorAll('.filter-pill').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const f = btn.dataset.filter;
    document.querySelectorAll('[data-cat]').forEach(el => {
      el.style.display = (f === 'all' || el.dataset.cat === f) ? '' : 'none';
    });
  });
});

// Scroll-reveal for masonry cards
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      e.target.style.opacity = '1';
      e.target.style.transform = 'translateY(0)';
    }
  });
}, { threshold: 0.04 });

document.querySelectorAll('.masonry-item').forEach((el, i) => {
  el.style.opacity = '0';
  el.style.transform = 'translateY(18px)';
  el.style.transition = `opacity 0.55s ease ${i * 0.035}s, transform 0.55s ease ${i * 0.035}s`;
  observer.observe(el);
});
</script>
</body>
</html>
